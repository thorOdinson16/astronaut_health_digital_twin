# =============================================================================
# ASTRONAUT DIGITAL TWIN - SIMULATION CONFIGURATION
# =============================================================================
# This file defines all simulation parameters for the hybrid digital twin.
# Each parameter includes justification based on aerospace medicine literature.
# =============================================================================

# -----------------------------------------------------------------------------
# MISSION PARAMETERS
# -----------------------------------------------------------------------------
mission:
  name: "ISS Long Duration Mission Simulation"
  duration_hours: 720  # 30 days (typical ISS increment)
  time_step_minutes: 5  # 5-minute resolution for physiological dynamics
  monte_carlo_runs: 100  # Number of ensemble runs for uncertainty quantification
  
  justification: |
    30-day mission captures adaptation period to microgravity.
    5-minute resolution captures acute motion sickness episodes and sleep cycles.
    100 Monte Carlo runs provides 95% confidence interval for risk estimates.

# -----------------------------------------------------------------------------
# ASTRONAUT BASELINE PARAMETERS
# -----------------------------------------------------------------------------
astronaut:
  # Cardiovascular baseline
  baseline_hr: 75  # bpm - resting heart rate
  hr_variability: 5  # bpm - normal circadian variation
  hr_bounds: [40, 200]  # bpm - physiological limits
  
  # Sleep parameters
  baseline_sleep_quality: 0.8  # [0-1] - nominal sleep efficiency
  sleep_duration_hours: 8.0  # hours - target sleep per rest period
  circadian_phase: 0  # hours - phase offset from mission start
  
  # Fatigue parameters
  initial_fatigue: 0.0  # [0-10] - starting fatigue level
  max_fatigue: 10.0  # [0-10] - maximum fatigue index
  fatigue_recovery_rate: 0.08  # per hour - recovery during sleep
  
  # Stress parameters
  baseline_stress: 0.2  # [0-1] - nominal stress level
  stress_bounds: [0, 1]  # [0-1] - normalized stress
  
  justification: |
    Baseline values derived from NASA's Longitudinal Study of Astronaut Health (LSAH).
    Heart rate variability based on ISS mission data (NASA/TM-2015-218568).
    Sleep quality baseline from actigraphy studies on ISS (Flynn-Evans et al., 2016).

# -----------------------------------------------------------------------------
# EVENT PARAMETERS
# -----------------------------------------------------------------------------
events:
  
  # Motion Sickness Parameters
  motion_sickness:
    enabled: true
    base_rate: 0.03  # events per hour (Poisson λ)
    adaptation_rate: 0.1  # per hour - adaptation to microgravity
    min_severity: 0.2  # [0-1] - mild symptoms
    max_severity: 1.0  # [0-1] - severe symptoms
    min_duration: 0.5  # hours - transient episode
    max_duration: 4.0  # hours - prolonged episode
    refractory_period: 4.0  # hours - minimum time between episodes
    
    # Physiological effects
    hr_increase: 15  # bpm per severity unit
    stress_increase: 0.3  # [0-1] per severity unit
    sleep_degradation: 0.3  # sleep quality reduction per severity unit
    
    justification: |
      Motion sickness incidence rate (0.03/hr) based on 67-75% of astronauts
      experiencing SMS in first 48-72 hours (Heer & Paloski, 2006).
      Duration parameters from Russian space program data (Kornilova, 1997).
  
  # Sleep Disruption Parameters
  sleep_disruption:
    enabled: true
    
    # Trigger thresholds
    fatigue_threshold: 3.0  # [0-10] - fatigue level for disruption risk
    critical_fatigue: 6.0  # [0-10] - guaranteed disruption
    ms_severity_threshold: 1.5  # [0-5] - motion sickness effect
    
    # Probability parameters
    base_probability: 0.1  # per sleep period
    fatigue_sensitivity: 0.15  # probability increase per fatigue unit
    ms_sensitivity: 0.2  # probability increase per motion severity unit
    
    # Severity parameters
    min_severity: 0.2  # [0-1] - mild disruption
    max_severity: 1.0  # [0-1] - severe disruption
    
    # Duration parameters
    min_disruption_hours: 2.0  # hours
    max_disruption_hours: 8.0  # hours
    
    justification: |
      Sleep disruption thresholds based on Pittsburgh Sleep Quality Index (PSQI)
      adapted for spaceflight (Dijk et al., 2001). Fatigue threshold of 3.0
      corresponds to Karolinska Sleepiness Scale score of 7 (severe sleepiness).

# -----------------------------------------------------------------------------
# COUPLING PARAMETERS
# -----------------------------------------------------------------------------
coupling:
  
  # Motion Sickness → Sleep coupling
  ms_to_sleep:
    base_degradation: 0.15  # 15% reduction baseline
    severity_multiplier: 0.1  # additional 10% per severity point
    effect_duration_hours: 6.0  # hours - effect persists after event
    recovery_rate: 0.2  # per hour - recovery after event
    
  # Fatigue → Motion Sickness coupling
  fatigue_to_ms:
    base_prob_increase: 0.1  # 10% baseline increase
    threshold: 3.0  # fatigue threshold for effects
    severity_multiplier: 0.15  # severity increase per fatigue point
    prob_slope: 0.05  # probability increase per fatigue point
  
  # Global coupling limits
  max_coupling_effect: 0.8  # maximum 80% effect
  min_sleep_quality: 0.1  # minimum possible sleep quality
  max_motion_probability: 0.5  # max motion sickness probability per hour
  
  justification: |
    Coupling parameters derived from bidirectional relationships observed in
    submarine crew studies (fatigue → motion sickness) and post-flight surveys
    (motion sickness → sleep disruption). Values calibrated to match reported
    symptom correlations (r = 0.4-0.6) from NASA's Behavioral Health and
    Performance Element research.

# -----------------------------------------------------------------------------
# MONTE CARLO ANALYSIS
# -----------------------------------------------------------------------------
monte_carlo:
  runs: 100  # number of simulations
  confidence_level: 0.95  # 95% confidence intervals
  output_metrics:
    - peak_fatigue
    - time_to_recovery
    - motion_sickness_frequency
    - sleep_efficiency
    - risk_crossings
  random_seed: 42  # fixed seed for reproducibility
  
  convergence_criteria:
    max_runs: 1000
    tolerance: 0.01  # stop when metrics stabilize within 1%
    
  justification: |
    100 runs provides sufficient statistical power for detecting 20% differences
    in fatigue accumulation (α = 0.05, β = 0.2). Seed fixed for reproducibility
    in accordance with NASA's verification and validation guidelines.

# -----------------------------------------------------------------------------
# OUTPUT CONFIGURATION
# -----------------------------------------------------------------------------
output:
  format: "json"  # json, csv, or both
  save_trajectories: true
  save_events: true
  save_summary: true
  compression: false  # compress large files
  
  visualization:
    generate_plots: true
    plot_format: "html"  # html, png, or both
    dashboard_port: 8050  # Plotly Dash port
    
  data_path: "./output/simulations/"
  log_path: "./output/logs/"

# -----------------------------------------------------------------------------
# VALIDATION RULES
# -----------------------------------------------------------------------------
validation:
  enabled: true
  strict_mode: false  # if true, raise errors on bound violations
  
  bounds_checking:
    heart_rate: [40, 200]  # bpm
    sleep_quality: [0, 1]  # normalized
    fatigue: [0, 10]  # cumulative index
    stress: [0, 1]  # normalized
    motion_severity: [0, 5]  # subjective scale
  
  sanity_checks:
    max_fatigue_increase_per_hour: 1.0  # prevent unrealistic jumps
    max_hr_increase_per_event: 30  # bpm
    min_time_between_events: 0.5  # hours